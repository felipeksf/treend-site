<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Treend - O Seu Guia de Câmbio</title>
    <meta name="description" content="Tome decisões mais assertivas de câmbio com IA. A Treend é a sua segunda calculadora no dia-a-dia!">
    
    <link href="https://framerusercontent.com/images/WMt3McCyXxx7fJHWDdZcTfl96I.png" rel="icon">
    <link rel="apple-touch-icon" href="https://framerusercontent.com/images/vp4hfiE322Vz7chAdvmqEzkxanY.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Reset e Base */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; font-family: "Inter", sans-serif; background-color: #fff; overflow-x: hidden; }
        
        :root {
            --token-primary: #f25b45; /* Laranja Treend */
            --token-secondary: #df3b23;
            --token-text: #0910ed6c;
            --token-white: #ffffff;
        }

        /* REMOÇÃO AGRESSIVA DA MARCA D'ÁGUA */
        #__framer-badge-container, 
        .framer-badge, 
        [data-framer-badge],
        iframe[src*="framer.com"] { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important; 
            pointer-events: none !important; 
        }

        /* Estrutura de Layout baseada no seu projeto */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .hero {
            padding: 100px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: "Lexend", sans-serif;
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 700;
            line-height: 1.1;
            color: #000;
            margin-bottom: 24px;
        }

        p.description {
            font-size: 18px;
            color: #6d6d6d;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-primary {
            background-color: var(--token-primary);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-family: "Lexend", sans-serif;
            font-weight: 600;
            transition: transform 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background-color: var(--token-secondary);
        }

        /* Esconde elementos residuais do Framer que podem quebrar o layout */
        .hidden-mobile { @media(max-width: 810px) { display: none; } }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <img src="https://framerusercontent.com/images/WMt3McCyXxx7fJHWDdZcTfl96I.png" alt="Treend" style="height: 32px;">
            <nav>
                <a href="#" class="btn-primary" style="padding: 10px 20px; font-size: 14px;">Entrar</a>
            </nav>
        </div>
    </header>

    <main id="main">
        <section class="hero">
            <div class="container">
                <h1>Treend - O Seu Guia de Câmbio</h1>
                <p class="description">
                    Tome decisões mais assertivas de câmbio com IA. <br>
                    A Treend é a sua segunda calculadora no dia-a-dia!
                </p>
                <div style="display: flex; gap: 16px; justify-content: center;">
                    <a href="https://app.treend.com.br" class="btn-primary">Começar Agora</a>
                </div>
            </div>
        </section>
        
        <div class="container" style="margin-top: -40px; text-align: center;">
             <img src="https://framerusercontent.com/images/vp4hfiE322Vz7chAdvmqEzkxanY.png" 
                  alt="Interface Treend" 
                  style="width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        </div>
    </main>

    <script>
        // Remove qualquer elemento injetado dinamicamente que contenha "Framer"
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.id === '__framer-badge-container' || (node.className && typeof node.className === 'string' && node.className.includes('framer'))) {
                        node.remove();
                    }
                });
            });
        });

        observer.observe(document.body, { childList: true, subtree: true });

        // Garante que o badge original seja removido logo no carregamento
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('#__framer-badge-container').forEach(el => el.remove());
        });
    </script>
</body>
</html>
